  <text x="228" y="180" fill="#5b667a" font-family="Inter, Arial, sans-serif" font-size="16">Live transcription and notes</text>
  <rect x="122" y="234" width="332" height="250" rx="20" fill="#fff"/>
  <text x="154" y="276" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Audio Input</text>
