<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Voice to text translator mockup</title>
  <desc id="desc">A speech recognition interface with waveform, transcript, and generated notes panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#172033" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="960" height="600" rx="32" fill="url(#bg)"/>
  <path d="M54 465 C190 365 265 520 394 414 C514 315 622 333 886 180" fill="none" stroke="#fff" stroke-width="90" opacity=".08"/>
  <rect x="86" y="74" width="788" height="452" rx="24" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="122" y="112" width="716" height="92" rx="20" fill="#eef5ff"/>
  <circle cx="176" cy="158" r="28" fill="#2563eb"/>
  <rect x="168" y="141" width="16" height="34" rx="8" fill="#fff"/>
