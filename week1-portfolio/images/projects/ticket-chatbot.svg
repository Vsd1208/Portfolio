<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Voice ticket booking chatbot mockup</title>
  <desc id="desc">A train booking chatbot interface with route selection, voice prompt, and ticket confirmation panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#172033" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="960" height="600" rx="32" fill="url(#bg)"/>
  <circle cx="106" cy="102" r="142" fill="#fff" opacity=".1"/>
  <circle cx="806" cy="500" r="150" fill="#fff" opacity=".1"/>
  <rect x="86" y="74" width="788" height="452" rx="24" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="122" y="112" width="300" height="374" rx="20" fill="#fff"/>
  <text x="154" y="154" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Train Booking</text>
  <text x="154" y="182" fill="#5b667a" font-family="Inter, Arial, sans-serif" font-size="15">Voice guided assistant</text>
  <rect x="154" y="230" width="214" height="50" rx="16" fill="#eef5ff"/>
  <text x="180" y="262" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Hyderabad to Chennai</text>
  <rect x="154" y="306" width="174" height="50" rx="16" fill="#eef5ff"/>
  <text x="180" y="338" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Tomorrow</text>
  <rect x="154" y="414" width="134" height="44" rx="14" fill="#2563eb"/>
  <text x="189" y="443" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Book</text>
  <rect x="458" y="112" width="380" height="374" rx="20" fill="#e8f1ff"/>
  <rect x="500" y="154" width="236" height="54" rx="20" fill="#fff"/>
  <text x="526" y="188" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Find trains for tomorrow</text>
  <rect x="574" y="238" width="220" height="54" rx="20" fill="#2563eb"/>
  <text x="600" y="272" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">3 trains available</text>
  <rect x="500" y="324" width="260" height="82" rx="20" fill="#fff"/>
  <circle cx="538" cy="365" r="18" fill="#0f766e"/>
  <rect x="572" y="350" width="148" height="12" rx="6" fill="#172033"/>
  <rect x="572" y="376" width="116" height="12" rx="6" fill="#8ba0bd"/>
  <circle cx="788" cy="428" r="34" fill="#f97316"/>
  <rect x="778" y="408" width="20" height="34" rx="10" fill="#fff"/>
</svg>
