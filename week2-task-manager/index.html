<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive task manager built with vanilla JavaScript, localStorage, filtering, editing, drag and drop, and responsive design.">
    <title>Interactive Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <section class="app-header" aria-labelledby="app-title">
            <div>
                <p class="eyebrow">Week 2 JavaScript Project</p>
                <h1 id="app-title">Interactive Task Manager</h1>
                <p class="intro">Plan work, track progress, and keep tasks available between visits with localStorage.</p>
            </div>
            <button class="icon-button theme-toggle" id="themeToggle" type="button" aria-label="Switch color theme" title="Switch color theme">
                <span id="themeIcon" aria-hidden="true">☾</span>
            </button>
        </section>

        <section class="task-board" aria-label="Task manager controls">
            <form class="task-form" id="taskForm" novalidate>
                <div class="field task-input-field">
                    <label for="taskInput">Task</label>
                    <input id="taskInput" name="task" type="text" maxlength="120" placeholder="Add a new task" autocomplete="off" required>
                    <span class="error-message" id="taskError" aria-live="polite"></span>
                </div>
                <div class="field">
                    <label for="dueDate">Due date</label>
                    <input id="dueDate" name="dueDate" type="date">
                </div>
                <div class="field">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button class="primary-button" id="submitButton" type="submit">Add Task</button>
            </form>

            <div class="toolbar" aria-label="Task filters and search">
                <div class="filter-group" role="group" aria-label="Filter tasks">
                    <button class="filter-button active" type="button" data-filter="all">All</button>
                    <button class="filter-button" type="button" data-filter="active">Active</button>
                    <button class="filter-button" type="button" data-filter="completed">Completed</button>
                </div>
                <div class="search-field">
                    <label for="searchInput">Search</label>
                    <input id="searchInput" type="search" placeholder="Search tasks">
                </div>
            </div>

            <div class="stats-grid" aria-label="Task statistics">
                <article class="stat-card">
                    <span id="totalTasks">0</span>
                    <p>Total</p>
                </article>
                <article class="stat-card">
                    <span id="activeTasks">0</span>
                    <p>Active</p>
                </article>
                <article class="stat-card">
                    <span id="completedTasks">0</span>
                    <p>Completed</p>
                </article>
                <article class="stat-card">
                    <span id="highPriorityTasks">0</span>
                    <p>High Priority</p>
                </article>
            </div>

            <div class="list-header">
                <h2>Tasks</h2>
                <div class="utility-actions">
                    <button class="secondary-button" id="clearCompleted" type="button">Clear Completed</button>
                    <button class="secondary-button" id="backupTasks" type="button">Backup</button>
                    <label class="secondary-button file-label" for="restoreTasks">Restore</label>
                    <input class="visually-hidden" id="restoreTasks" type="file" accept="application/json">
                </div>
            </div>

            <ul class="task-list" id="taskList" aria-live="polite"></ul>
            <p class="empty-state" id="emptyState">No tasks yet. Add your first task above.</p>
            <p class="status-message" id="statusMessage" role="status" aria-live="polite"></p>
        </section>
    </main>

    <template id="taskTemplate">
        <li class="task-item" draggable="true">
            <button class="drag-handle" type="button" aria-label="Drag task" title="Drag task">↕</button>
            <label class="check-wrap">
                <input class="task-check" type="checkbox">
                <span></span>
            </label>
            <div class="task-content">
                <button class="task-text" type="button"></button>
                <div class="task-meta">
                    <span class="priority-pill"></span>
                    <span class="due-pill"></span>
                </div>
            </div>
            <div class="task-actions">
                <button class="icon-button edit-task" type="button" aria-label="Edit task" title="Edit task">✎</button>
                <button class="icon-button delete-task" type="button" aria-label="Delete task" title="Delete task">×</button>
            </div>
        </li>
    </template>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
